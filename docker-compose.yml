services:
  web:
    build:
      context: ./mana-forge-web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always

  api:
    build:
      context: ./mana-forge-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVICES_PYTHON_ENGINE_URL=http://engine:8000
      - FRONTEND_URL=http://localhost
      - STRAPI_API_URL=${STRAPI_API_URL:-https://original-book-1bf186e2ab.strapiapp.com/api}
      - STRAPI_API_TOKEN=${STRAPI_API_TOKEN:-a6a6f1ccc517498711021dff78c51290ab57bfc2379d69a393dfb0d3156b5501b7fff3149987c92ecacc03022b926594cff6f4ef4a718b48129fcac2c854b11113a16f1b3238f3547dc527cc65dd67101a3d0a46a4ba28161e39be9390beb52726f92d36d6c1291e7bb2692b0340b0cd0efc4819fa410d7d6b4e5e5a6ad90964}
      - SPRING_DATA_MONGODB_URI=${MONGODB_URI:-mongodb+srv://valanhyr_db_user:0wtjeXsiAAEKkYGH@cluster0.3jvqdu6.mongodb.net/production?appName=Cluster0}
    depends_on:
      - engine
    restart: always

  engine:
    build:
      context: ./mana-forge-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-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}
    restart: always
