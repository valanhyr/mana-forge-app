services:
  # FRONTEND: Servido por Nginx (Puerto 80)
  web:
    build:
      context: ./mana-forge-web
      dockerfile: Dockerfile
      args:
        # Usamos /api para que Nginx haga de puente y evitemos Mixed Content
        - VITE_API_URL=/api
    container_name: mana-forge-web-1
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always
    networks:
      - mana-forge-network

  # BACKEND: Java Spring Boot (Puerto 8080)
  api:
    build:
      context: ./mana-forge-api
      dockerfile: Dockerfile
    container_name: mana-forge-api-1
    ports:
      - "8080:8080"
    environment:
      # Comunicación interna: 'engine' es el nombre del servicio de abajo
      - SERVICES_PYTHON_ENGINE_URL=http://engine:8000
      - FRONTEND_URL=${FRONTEND_URL}
      - STRAPI_API_URL=${STRAPI_API_URL}
      - STRAPI_API_TOKEN=${STRAPI_API_TOKEN}
      - MONGODB_URI=${MONGODB_URI}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SESSION_STORE_TYPE=redis
      # SMTP: Resend
      - SMTP_HOST=${SMTP_HOST:-smtp.resend.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-resend}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      engine:
        condition: service_started
      redis:
        condition: service_started
    restart: always
    networks:
      - mana-forge-network

  # ENGINE: Python FastAPI (Puerto 8000)
  engine:
    build:
      context: ./mana-forge-engine
      dockerfile: Dockerfile
    container_name: mana-forge-engine-1
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: always
    networks:
      - mana-forge-network

  # CACHE: Redis para cachear respuestas de Strapi/Scryfall/DB
  redis:
    image: redis:7-alpine
    container_name: mana-forge-cache-1
    command: redis-server
    restart: always
    networks:
      - mana-forge-network

# Red interna para que los contenedores se vean por nombre (api, engine)
networks:
  mana-forge-network:
    driver: bridge
